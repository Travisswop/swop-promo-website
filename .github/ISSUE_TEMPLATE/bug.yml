name: Bug Report
description: Report a bug with repro + ownership
title: "[Bug] "
labels: ["bug"]
body:
- type: textarea
id: summary
attributes:
label: Summary
validations:
required: true

- type: textarea
id: repro
attributes:
label: Steps to reproduce
placeholder: |
1.
2.
3.
validations:
required: true

- type: textarea
id: expected
attributes:
label: Expected behavior
validations:
required: true

- type: textarea
id: actual
attributes:
label: Actual behavior
validations:
required: true

- type: dropdown
id: owner
attributes:
label: Owner agent
options:
- frontend-agent
- backend-agent
- api-test-agent
- qa-agent
- devops-agent
- coordinator-agent
validations:
required: true
